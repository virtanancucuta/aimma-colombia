server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (rutas internas con hash)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML: nunca cachear (siempre fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }

    # JS y CSS: revalidar siempre (usa ETag para evitar re-descarga si no cambió)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        expires 0;
    }

    # Imagenes, fonts, etc: cache largo (estos sí raramente cambian)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compresion gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    # === AUTH + PANEL ===
    # Rewrite limpio para /iapanel (rutea a iapanel/index.html)
    location /iapanel {
        try_files $uri $uri/ /iapanel/index.html;
    }

    # Rutas limpias .html (sin extension visible)
    location ~ ^/(login|signup|auth-callback|completar-perfil|verificar|verificar-pendiente)$ {
        try_files $uri.html $uri =404;
    }

    # Headers de seguridad basicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
