server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (rutas internas con hash)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML: nunca cachear (siempre fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }

    # JS y CSS: revalidar siempre
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        expires 0;
    }

    # Imagenes, fonts: cache largo
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compresion gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    # === AUTH + PANEL ===
    location /iapanel {
        try_files $uri $uri/ /iapanel/index.html;
    }

    # Rutas limpias .html (sin extension visible)
    location ~ ^/(login|signup|auth-callback|completar-perfil|verificar|verificar-pendiente|upgrade-pro|mi-cuenta|pago-exitoso|pago-fallido|pago-pendiente|dashboard-pro)$ {
        try_files $uri.html $uri =404;
    }

    # === Headers de seguridad (defense in depth) ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: bloquea XSS exfil de localStorage/cookies. unsafe-inline necesario hasta migrar scripts inline a archivos.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://script.google.com https://script.googleusercontent.com https://api.mercadopago.com; frame-src https://www.mercadopago.com.co https://www.mercadopago.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://www.mercadopago.com.co https://www.mercadopago.com;" always;
    # HSTS: fuerza HTTPS en futuros requests (Easypanel maneja TLS externamente pero defense in depth)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Permissions Policy: bloquea features no usadas
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), interest-cohort=()" always;
}
