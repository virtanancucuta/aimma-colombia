<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#040d1a" />
  <title>Conectando · AIMMA Colombia</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" />

  <link rel="stylesheet" href="style.v3.css" />
</head>
<body>

  <div class="bg-halos" aria-hidden="true">
    <span class="halo halo-1"></span>
    <span class="halo halo-2"></span>
    <span class="halo halo-3"></span>
  </div>

  <!-- Estado: loader (default) -->
  <div id="loader" class="auth-loader">
    <div class="auth-loader-orb"></div>
    <div class="auth-loader-text" id="loaderText">Conectando con tu cuenta…</div>
  </div>

  <!-- Estado: error -->
  <div class="auth-page" id="errorView" hidden>
    <header class="auth-header">
      <a href="/" class="brand" aria-label="AIMMA Colombia - Inicio">
        <img src="assets/logo.svg" alt="" class="brand-logo" width="36" height="36" />
        <span class="brand-text">
          <span class="brand-name">AIMMA</span>
          <span class="brand-suffix">.COLOMBIA</span>
        </span>
      </a>
      <a href="/" class="auth-header-back">← Volver al sitio</a>
    </header>
    <main class="auth-main">
      <div class="auth-card">
        <h1 class="auth-title">No pudimos conectarte</h1>
        <p class="auth-subtitle" id="errorMsg">Hubo un problema al validar tu sesión.</p>
        <a href="/login.html" class="auth-submit" style="text-decoration:none; display:inline-block; text-align:center;">Volver a intentar</a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.v2.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function () {
      const supabase = window.supabaseClient;
      const A = window.AIMMA.auth;
      const loader = document.getElementById('loader');
      const loaderText = document.getElementById('loaderText');
      const errorView = document.getElementById('errorView');
      const errorMsg = document.getElementById('errorMsg');

      function showError(msg) {
        loader.classList.add('hidden');
        errorMsg.textContent = msg || 'No pudimos validar tu sesión. Intenta de nuevo desde el login.';
        errorView.hidden = false;
      }

      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const tokenHash = params.get('token_hash');
        const type = params.get('type');
        const hasError = params.get('error_description') || params.get('error');
        // Importante: NO renderizamos el valor de error_description directamente
        // (puede usarse para phishing visual bajo el dominio aimma.com.co).
        // Mostramos un mensaje generico fijo y logueamos el detalle en consola.
        if (hasError) {
          console.warn('[AIMMA callback] OAuth error:', hasError);
          showError('Hubo un problema al autenticar con el proveedor. Intenta de nuevo.');
          return;
        }

        // 1) PKCE flow: ?code=...
        if (code) {
          loaderText.textContent = 'Activando tu cuenta…';
          const { error } = await supabase.auth.exchangeCodeForSession(code);
          if (error) { showError(A.friendlyError(error)); return; }
        }
        // 2) Email confirmation legacy: ?token_hash=...&type=signup|magiclink|recovery
        else if (tokenHash) {
          loaderText.textContent = 'Verificando tu correo…';
          const { error } = await supabase.auth.verifyOtp({
            token_hash: tokenHash,
            type: type || 'signup',
          });
          if (error) { showError(A.friendlyError(error)); return; }
        }
        // 3) OAuth implicit: tokens en hash (#access_token=...). supabase-js los
        //    procesa automaticamente al inicializar. Esperamos al evento SIGNED_IN
        //    en lugar de un setTimeout fragil.
        else {
          loaderText.textContent = 'Validando tu sesión…';
          await new Promise((resolve) => {
            let resolved = false;
            const tm = setTimeout(() => { if (!resolved) { resolved = true; resolve(); } }, 3000);
            supabase.auth.onAuthStateChange((event) => {
              if (event === 'SIGNED_IN' && !resolved) {
                resolved = true; clearTimeout(tm); resolve();
              }
            });
          });
        }

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          showError('No encontramos una sesión activa. Vuelve a intentar.');
          return;
        }

        loaderText.textContent = 'Cargando tu perfil…';
        const { user, profile } = await A.getCurrentUser();
        const provider = user?.app_metadata?.provider || 'email';

        // === Lógica de email verification AIMMA ===
        // - Email/password: el usuario YA verifico via Supabase (acaba de hacer
        //   verifyOtp/exchangeCodeForSession). Marcamos email_aimma_verificado=true
        //   y disparamos welcome email. No mandamos verification AIMMA (seria
        //   doble verificacion redundante).
        // - Google OAuth: Google verifico el correo, pero AIMMA requiere su
        //   propio touchpoint. Disparamos verification email AIMMA y
        //   redirigimos a /verificar-pendiente hasta que clickee.
        async function callEdgeFn(name) {
          try {
            await fetch(`${supabase.supabaseUrl}/functions/v1/${name}`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${session.access_token}`,
                'Content-Type': 'application/json',
                'apikey': supabase.supabaseKey,
              },
            });
          } catch (e) {
            console.warn(`[AIMMA callback] ${name} fallo (no critico):`, e);
          }
        }

        if (profile && profile.email_aimma_verificado === false) {
          if (provider === 'email') {
            // Email/password recien confirmado: marcamos verificado + welcome
            loaderText.textContent = 'Activando tu cuenta AIMMA…';
            await supabase.from('profiles')
              .update({ email_aimma_verificado: true })
              .eq('id', user.id);
            await callEdgeFn('send-welcome-email');
          } else {
            // OAuth (Google etc.): disparar verification email AIMMA
            loaderText.textContent = 'Enviando verificación AIMMA…';
            await callEdgeFn('send-verification-email');
            window.location.replace('/verificar-pendiente.html');
            return;
          }
        } else if (profile && profile.email_aimma_verificado === true && !profile.welcome_enviado_at) {
          // Caso edge: ya verificado pero welcome no se mando (ej. verifico
          // en otro device sin sesion). Disparar welcome ahora.
          await callEdgeFn('send-welcome-email');
        }

        // Routing final
        if (profile && profile.perfil_completo === false) {
          window.location.replace('/completar-perfil.html');
        } else {
          window.location.replace('/iapanel/');
        }
      } catch (err) {
        console.error('[AIMMA callback] error:', err);
        showError(A.friendlyError(err));
      }
    })();
  </script>
</body>
</html>
