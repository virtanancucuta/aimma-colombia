<div class="ed-inspector__body"><div class="ed-inspector__head"><h4 class="ed-inspector__header">Seccion: Franja de imagenes</h4><button type="button" class="ed-inspector__close" aria-label="Cerrar panel">×</button></div><h5 class="ed-inspector__subhead">Slides e imagenes</h5><div class="ed-list-item"><div class="ed-list-item__head"><span class="ed-list-item__title">Slide 1</span><div class="ed-list-item__acts"></div></div><div class="ed-list-item__body"><div class="ed-list-item"><div class="ed-list-item__head"><span class="ed-list-item__title">Imagen 1</span><div class="ed-list-item__acts"></div></div><div class="ed-list-item__body"><div class="ed-ctrl"><label class="ed-ctrl__label">Imagen</label><div class="ed-imgpicker"><div class="ed-imgpicker__preview"><img class="ed-imgpicker__thumb" src="https://placehold.co/1400x900" alt=""></div><button type="button" class="ed-btn ed-btn--secondary ed-imgpicker__btn">Cambiar imagen</button></div><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Texto alternativo (alt)</label><input type="text" class="ed-ctrl__input" value="" maxlength="160" placeholder=""><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Link al hacer clic (opcional)</label><input type="text" class="ed-ctrl__input" value="" placeholder="https://..."><p class="ed-ctrl__error" hidden=""></p></div><details class="ed-collapse"><summary class="ed-collapse__summary">Texto sobre la imagen (opcional)</summary><div class="ed-collapse__body"><div class="ed-ctrl"><label class="ed-ctrl__label">Texto sobre la imagen</label><input type="text" class="ed-ctrl__input" value="" maxlength="160" placeholder="Ej: Nueva coleccion"><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Posicion del texto</label><select class="ed-ctrl__select"><option value="arriba-izquierda">Arriba izquierda</option><option value="arriba-centro">Arriba centro</option><option value="arriba-derecha">Arriba derecha</option><option value="medio-izquierda">Medio izquierda</option><option value="centro">Centro</option><option value="medio-derecha">Medio derecha</option><option value="abajo-izquierda">Abajo izquierda</option><option value="abajo-centro">Abajo centro</option><option value="abajo-derecha">Abajo derecha</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Color del texto</label><div class="ed-ctrl__color-wrap"><input type="color" class="ed-ctrl__color" value="#ffffff"><input type="text" class="ed-ctrl__input ed-ctrl__color-hex" value="#ffffff" placeholder="#RRGGBB" maxlength="9"></div><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Velo detras del texto</label><select class="ed-ctrl__select"><option value="rgba(0,0,0,0.4)">Velo oscuro (recomendado)</option><option value="rgba(0,0,0,0.25)">Velo oscuro suave</option><option value="rgba(0,0,0,0.6)">Velo oscuro fuerte</option><option value="rgba(255,255,255,0.55)">Velo claro</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Borde del recuadro</label><select class="ed-ctrl__select"><option value="ninguno">Sin borde</option><option value="fino">Fino</option><option value="grueso">Grueso</option></select><p class="ed-ctrl__error" hidden=""></p></div></div></details></div></div><button type="button" class="ed-btn ed-btn--primary">+ Agregar imagen</button></div></div><button type="button" class="ed-btn ed-btn--primary">+ Agregar slide</button><div class="ed-ctrl"><label class="ed-ctrl__label">Altura de la banda</label><select class="ed-ctrl__select"><option value="corto">Corta</option><option value="medio">Media (recomendada)</option><option value="alto">Alta</option><option value="adaptarse">Adaptarse a la imagen</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Separacion entre imagenes</label><select class="ed-ctrl__select"><option value="none">Sin separacion</option><option value="min">Minima</option><option value="small">Pequena</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl ed-ctrl--switch"><label class="ed-ctrl__label">Auto-rotar el slider</label><label class="ed-ctrl__switch"><input type="checkbox"><span class="ed-ctrl__switch-slider"></span></label><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Intervalo del auto-rotar (segundos)</label><div class="ed-ctrl__slider-wrap"><input type="range" class="ed-ctrl__range" min="3" max="15" step="1" value="5"><span class="ed-ctrl__slider-num">5</span></div><p class="ed-ctrl__error" hidden=""></p></div><details class="ed-collapse"><summary class="ed-collapse__summary">Apariencia de la seccion</summary><div class="ed-collapse__body"><div class="ed-ctrl"><label class="ed-ctrl__label">Ancho</label><select class="ed-ctrl__select"><option value="completo">Ancho completo (borde a borde)</option><option value="contenido">Centrado (con margenes)</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Espacio interno (padding)</label><select class="ed-ctrl__select"><option value="sm">Pequeno</option><option value="md">Medio</option><option value="lg">Grande</option><option value="xl">Extra grande</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Tipo de fondo</label><select class="ed-ctrl__select"><option value="transparente">Transparente</option><option value="color">Color</option><option value="imagen">Imagen</option><option value="gradient">Degradado CSS</option></select><p class="ed-ctrl__error" hidden=""></p></div></div></details><button type="button" class="ed-btn ed-btn--primary">Duplicar seccion</button><button type="button" class="ed-btn ed-btn--danger">Eliminar seccion</button></div>
