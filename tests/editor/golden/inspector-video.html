<div class="ed-inspector__body"><div class="ed-inspector__head"><h4 class="ed-inspector__header">Seccion: Video o mapa</h4><button type="button" class="ed-inspector__close" aria-label="Cerrar panel">×</button></div><div class="ed-ctrl"><label class="ed-ctrl__label">Codigo del video (iframe)</label><textarea class="ed-ctrl__textarea" rows="6" maxlength="2000" placeholder="<iframe src=&quot;https://www.youtube.com/embed/...&quot;></iframe>"></textarea><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-inspector__info">Solo se permiten videos o mapas de: YouTube, Vimeo, CodePen, CodeSandbox, Google Maps o Spotify.</div><div class="ed-ctrl"><label class="ed-ctrl__label">Proporcion</label><select class="ed-ctrl__select"><option value="16/9">16:9 (video)</option><option value="4/3">4:3</option><option value="1/1">1:1 (cuadrado)</option></select><p class="ed-ctrl__error" hidden=""></p></div><details class="ed-collapse"><summary class="ed-collapse__summary">Apariencia de la seccion</summary><div class="ed-collapse__body"><div class="ed-ctrl"><label class="ed-ctrl__label">Ancho</label><select class="ed-ctrl__select"><option value="completo">Ancho completo (borde a borde)</option><option value="contenido">Centrado (con margenes)</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Espacio interno (padding)</label><select class="ed-ctrl__select"><option value="sm">Pequeno</option><option value="md">Medio</option><option value="lg">Grande</option><option value="xl">Extra grande</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Tipo de fondo</label><select class="ed-ctrl__select"><option value="transparente">Transparente</option><option value="color">Color</option><option value="imagen">Imagen</option><option value="gradient">Degradado CSS</option></select><p class="ed-ctrl__error" hidden=""></p></div></div></details><button type="button" class="ed-btn ed-btn--primary">Duplicar seccion</button><button type="button" class="ed-btn ed-btn--danger">Eliminar seccion</button></div>
