<div class="ed-inspector__body"><div class="ed-inspector__head"><h4 class="ed-inspector__header">Seccion: Video o mapa</h4><button type="button" class="ed-inspector__close" aria-label="Cerrar panel">×</button></div><div class="ed-ctrl"><label class="ed-ctrl__label">Subí tu propio video (MP4, máximo 15 MB)</label><div class="ed-vidup"><div class="ed-vidup__row"><span class="ed-vidup__status">Sin video</span><button type="button" class="ed-btn ed-btn--secondary ed-vidup__btn">Subir video MP4</button><button type="button" class="ed-btn ed-btn--ghost ed-vidup__remove" hidden="">Quitar</button></div><div class="ed-vidup__bar" hidden=""><div class="ed-vidup__fill"></div></div><input type="file" accept="video/mp4" class="ed-vidup__file"></div><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-inspector__info">O, si preferís, pegá un link de YouTube o Vimeo abajo. Si subís un MP4, ese tiene prioridad.</div><div class="ed-ctrl"><label class="ed-ctrl__label">Link del video (YouTube o Vimeo)</label><input type="text" class="ed-ctrl__input" value="" maxlength="500" placeholder="https://www.youtube.com/watch?v=..."><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-inspector__info">Pega el link de YouTube o Vimeo y listo. Para Google Maps, Spotify u otros, pega el codigo &lt;iframe&gt; en el campo de abajo.</div><div class="ed-ctrl"><label class="ed-ctrl__label">O pega un codigo &lt;iframe&gt; (avanzado)</label><textarea class="ed-ctrl__textarea" rows="4" maxlength="2000" placeholder="<iframe src=&quot;https://www.youtube.com/embed/...&quot;></iframe>"></textarea><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Proporcion</label><select class="ed-ctrl__select"><option value="16/9">16:9 (video)</option><option value="4/3">4:3</option><option value="1/1">1:1 (cuadrado)</option></select><p class="ed-ctrl__error" hidden=""></p></div><details class="ed-collapse"><summary class="ed-collapse__summary">Apariencia de la seccion</summary><div class="ed-collapse__body"><div class="ed-ctrl"><label class="ed-ctrl__label">Ancho</label><select class="ed-ctrl__select"><option value="completo">Ancho completo (borde a borde)</option><option value="contenido">Centrado (con margenes)</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Espacio interno (padding)</label><select class="ed-ctrl__select"><option value="sm">Pequeno</option><option value="md">Medio</option><option value="lg">Grande</option><option value="xl">Extra grande</option></select><p class="ed-ctrl__error" hidden=""></p></div><div class="ed-ctrl"><label class="ed-ctrl__label">Tipo de fondo</label><select class="ed-ctrl__select"><option value="transparente">Transparente</option><option value="color">Color</option><option value="imagen">Imagen</option><option value="gradient">Degradado CSS</option></select><p class="ed-ctrl__error" hidden=""></p></div></div></details><button type="button" class="ed-btn ed-btn--primary">Duplicar seccion</button><button type="button" class="ed-btn ed-btn--danger">Eliminar seccion</button></div>
