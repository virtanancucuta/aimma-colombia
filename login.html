<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fafafa" />
  <title>Iniciar sesión · AIMMA Colombia</title>
  <meta name="description" content="Ingresa a tu Panel IA de AIMMA Colombia." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" />

  <link rel="stylesheet" href="style.v3.css" />
</head>
<body>

  <div class="bg-halos" aria-hidden="true">
    <span class="halo halo-1"></span>
    <span class="halo halo-2"></span>
    <span class="halo halo-3"></span>
  </div>

  <div class="auth-page">

    <header class="auth-header">
      <a href="/" class="brand" aria-label="AIMMA Colombia - Inicio">
        <img src="assets/logo.svg" alt="" class="brand-logo" width="36" height="36" />
        <span class="brand-text">
          <span class="brand-name">AIMMA</span>
          <span class="brand-suffix">.COLOMBIA</span>
        </span>
      </a>
      <a href="/" class="auth-header-back">← Volver al sitio</a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <h1 class="auth-title">Tu Panel IA</h1>
        <p class="auth-subtitle">Ingresa para acceder a tus módulos</p>

        <div id="alertBox" class="auth-alert auth-alert--error" hidden></div>

        <button type="button" id="btnGoogle" class="btn-google">
          <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.71H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continuar con Google
        </button>

        <div class="auth-divider">o ingresa con tu correo</div>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="li-email">Correo <em>*</em></label>
            <input type="email" id="li-email" name="email" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="li-password">Contraseña <em>*</em></label>
            <input type="password" id="li-password" name="password" autocomplete="current-password" required minlength="8" />
            <button type="button" id="btnForgot" class="auth-forgot">¿Olvidé mi contraseña?</button>
          </div>
          <button type="submit" id="btnSubmit" class="auth-submit">Iniciar sesión</button>
        </form>

        <p class="auth-bottom">¿No tienes cuenta? <a href="/signup.html" class="auth-link">Regístrate</a></p>
      </div>
    </main>
  </div>

  <!-- Overlay loader (mientras procesa Google OAuth o login) -->
  <div id="loader" class="auth-loader hidden">
    <div class="auth-loader-orb"></div>
    <div class="auth-loader-text">Conectando…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.v2.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function () {
      const A = window.AIMMA.auth;
      const form = document.getElementById('loginForm');
      const btnGoogle = document.getElementById('btnGoogle');
      const btnForgot = document.getElementById('btnForgot');
      const btnSubmit = document.getElementById('btnSubmit');
      const alertBox = document.getElementById('alertBox');
      const loader = document.getElementById('loader');

      // Bloquear UI hasta validar sesion (sino race condition: user puede
      // clickear Google/submit antes de que requireGuest resuelva).
      btnGoogle.disabled = true;
      btnSubmit.disabled = true;
      await A.requireGuest();
      btnGoogle.disabled = false;
      btnSubmit.disabled = false;

      function showAlert(msg) {
        alertBox.textContent = msg;
        alertBox.hidden = false;
      }
      function hideAlert() { alertBox.hidden = true; }

      btnGoogle.addEventListener('click', async () => {
        hideAlert();
        loader.classList.remove('hidden');
        const { error } = await A.signInWithGoogle();
        if (error) {
          loader.classList.add('hidden');
          showAlert(A.friendlyError(error));
        }
      });

      btnForgot.addEventListener('click', () => {
        alert('Pronto disponible. Por ahora escríbenos por WhatsApp al +57 313 362 3071 y te ayudamos a recuperarla.');
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();
        const data = new FormData(form);
        const email = data.get('email');
        const password = data.get('password');
        if (!email || !password) { showAlert('Completa correo y contraseña.'); return; }
        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Ingresando…';
        const { error } = await A.signInWithEmail(email, password);
        if (error) {
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Iniciar sesión';
          showAlert(A.friendlyError(error));
          return;
        }
        window.location.replace('/iapanel/');
      });
    })().catch(err => {
      console.error('[AIMMA login init]', err);
    });
  </script>
</body>
</html>
