<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#040d1a" />
  <title>Verifica tu correo · AIMMA Colombia</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" />

  <link rel="stylesheet" href="style.v3.css" />
</head>
<body>

  <div class="bg-halos" aria-hidden="true">
    <span class="halo halo-1"></span>
    <span class="halo halo-2"></span>
    <span class="halo halo-3"></span>
  </div>

  <div id="loader" class="auth-loader" role="status" aria-live="polite">
    <div class="auth-loader-orb"></div>
    <div class="auth-loader-text">Cargando…</div>
  </div>

  <div class="auth-page" id="content" hidden>
    <header class="auth-header">
      <a href="/" class="brand" aria-label="AIMMA Colombia - Inicio">
        <img src="assets/logo.svg" alt="" class="brand-logo" width="36" height="36" />
        <span class="brand-text">
          <span class="brand-name">AIMMA</span>
          <span class="brand-suffix">.COLOMBIA</span>
        </span>
      </a>
      <button type="button" id="btnLogout" class="auth-header-back" style="background:transparent; border:0; cursor:pointer; font-family:inherit;">Cerrar sesión</button>
    </header>
    <main class="auth-main">
      <div class="auth-card auth-confirm">
        <div class="auth-confirm-icon" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
        </div>
        <h1 class="auth-title">Verifica tu correo</h1>
        <p class="auth-subtitle">
          Te enviamos un correo a <span id="userEmail" class="auth-confirm-email">…</span> desde
          <strong>aimma.colombia@gmail.com</strong>. Hacé click en el botón
          <strong>"Verificar mi correo"</strong> para activar tu Panel IA.
        </p>
        <p class="auth-subtitle" style="margin-top:-12px; font-size:0.85rem; color:var(--white-40);">
          Revisá tu bandeja de entrada y la carpeta de spam o correo no deseado.
        </p>

        <div id="alertBox" class="auth-alert auth-alert--info" hidden></div>

        <div style="display:flex; flex-direction:column; gap:10px; margin-top:16px;">
          <button type="button" id="btnResend" class="auth-submit">Reenviar correo</button>
          <a href="https://wa.me/573133623071?text=Hola%20AIMMA%2C%20tengo%20problemas%20para%20verificar%20mi%20correo" target="_blank" rel="noopener" class="btn-google" style="text-decoration:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            ¿Problemas? Hablar por WhatsApp
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.v2.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function () {
      const supabase = window.supabaseClient;
      const A = window.AIMMA.auth;
      const loader = document.getElementById('loader');
      const content = document.getElementById('content');
      const userEmail = document.getElementById('userEmail');
      const btnResend = document.getElementById('btnResend');
      const btnLogout = document.getElementById('btnLogout');
      const alertBox = document.getElementById('alertBox');

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.replace('/login.html'); return; }

      const { user, profile } = await A.getCurrentUser();
      if (!user) { window.location.replace('/login.html'); return; }

      // Si YA esta verificado, no pinto esta pagina — redirigir al panel
      if (profile && profile.email_aimma_verificado === true) {
        if (profile.perfil_completo === false) window.location.replace('/completar-perfil.html');
        else window.location.replace('/iapanel/');
        return;
      }

      userEmail.textContent = user.email;
      loader.classList.add('hidden');
      content.hidden = false;

      function showAlert(msg, type = 'info') {
        alertBox.className = `auth-alert auth-alert--${type === 'error' ? 'error' : 'info'}`;
        alertBox.textContent = msg;
        alertBox.hidden = false;
      }

      // Cooldown 60s en reenvio (alineado con rate limit Edge Function)
      const COOLDOWN_S = 60;
      let cooldownTimer = null;
      function startCooldown(secs = COOLDOWN_S) {
        let s = secs;
        btnResend.disabled = true;
        btnResend.textContent = `Reenviar correo (${s}s)`;
        clearInterval(cooldownTimer);
        cooldownTimer = setInterval(() => {
          s--;
          if (s <= 0) {
            clearInterval(cooldownTimer);
            btnResend.disabled = false;
            btnResend.textContent = 'Reenviar correo';
          } else {
            btnResend.textContent = `Reenviar correo (${s}s)`;
          }
        }, 1000);
      }

      btnResend.addEventListener('click', async () => {
        alertBox.hidden = true;
        btnResend.disabled = true;
        btnResend.textContent = 'Enviando…';
        try {
          const res = await fetch(`${supabase.supabaseUrl}/functions/v1/send-verification-email`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${session.access_token}`,
              'Content-Type': 'application/json',
              'apikey': supabase.supabaseKey,
            },
          });
          const data = await res.json();
          if (res.status === 429 && data.wait_seconds) {
            showAlert(`Esperá ${data.wait_seconds} segundos antes de reenviar.`, 'info');
            startCooldown(data.wait_seconds);
            return;
          }
          if (data.error) {
            showAlert('No pudimos reenviar el correo. Intentá en 1 minuto o escribinos por WhatsApp.', 'error');
            btnResend.disabled = false;
            btnResend.textContent = 'Reenviar correo';
            return;
          }
          if (data.already_verified) {
            window.location.replace('/iapanel/');
            return;
          }
          showAlert('Correo reenviado. Revisá tu bandeja en unos segundos.', 'info');
          startCooldown();
        } catch (e) {
          showAlert('Error de conexión. Verificá tu internet.', 'error');
          btnResend.disabled = false;
          btnResend.textContent = 'Reenviar correo';
        }
      });

      btnLogout.addEventListener('click', async () => {
        btnLogout.disabled = true;
        await A.signOut();
        window.location.replace('/');
      });

      // Polling cada 5s para detectar si el user verifico en otro tab/device
      setInterval(async () => {
        const { profile: p2 } = await A.getCurrentUser();
        if (p2 && p2.email_aimma_verificado === true) {
          if (p2.perfil_completo === false) window.location.replace('/completar-perfil.html');
          else window.location.replace('/iapanel/');
        }
      }, 5000);
    })().catch(e => {
      console.error('[verificar-pendiente]', e);
      window.location.replace('/login.html');
    });
  </script>
</body>
</html>
